<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>ChatLLM Lab</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/highlight.js@11.10.0/styles/github-dark.min.css"
    />
    <style>
      :root {
        --bg-page: #ffffff;
        --text: #0d0d0d;
        --muted: #8e8ea0;
        --accent: #1a1a1a;
        --accent-hover: #404040;
        --user-bubble: #f4f4f4;
        --border: #e5e5e5;
        --composer-bg: #ffffff;
        --composer-border: #d9d9d9;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
      }

      body {
        background: var(--bg-page);
        color: var(--text);
        font-family: ui-sans-serif, -apple-system, system-ui, "Segoe UI", Helvetica, Arial, sans-serif;
        font-size: 16px;
        -webkit-font-smoothing: antialiased;
      }

      #root {
        width: 100%;
        height: 100%;
      }

      .app-shell {
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
      }

      .app-header {
        flex-shrink: 0;
        padding: 12px 24px;
        border-bottom: 1px solid var(--border);
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .brand {
        font-weight: 600;
        font-size: 0.95rem;
        color: var(--text);
        letter-spacing: 0;
      }

      .header-right {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .user-email {
        font-size: 0.82rem;
        color: var(--muted);
      }

      .logout-btn {
        background: none;
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 4px 12px;
        font-size: 0.82rem;
        color: var(--text);
        cursor: pointer;
      }

      .logout-btn:hover {
        background: var(--user-bubble);
      }

      .auth-container {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }

      .auth-form {
        width: 100%;
        max-width: 360px;
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      .auth-form h2 {
        margin: 0;
        font-size: 1.3rem;
        font-weight: 600;
        text-align: center;
      }

      .auth-form label {
        display: flex;
        flex-direction: column;
        gap: 4px;
        font-size: 0.85rem;
        color: var(--muted);
      }

      .auth-form input {
        padding: 10px 12px;
        border: 1px solid var(--composer-border);
        border-radius: 8px;
        font-size: 0.95rem;
        background: var(--composer-bg);
        color: var(--text);
        outline: none;
      }

      .auth-form input:focus {
        border-color: var(--accent);
      }

      .auth-form button[type="submit"] {
        padding: 10px;
        border: none;
        border-radius: 8px;
        background: var(--accent);
        color: #fff;
        font-size: 0.95rem;
        font-weight: 500;
        cursor: pointer;
      }

      .auth-form button[type="submit"]:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .auth-form button[type="submit"]:hover:not(:disabled) {
        background: var(--accent-hover);
      }

      .auth-toggle {
        text-align: center;
        font-size: 0.85rem;
        color: var(--muted);
      }

      .auth-toggle a {
        color: var(--accent);
        text-decoration: underline;
      }

      /* ── Sidebar ── */
      .app-layout {
        flex: 1;
        display: flex;
        min-height: 0;
      }

      .sidebar {
        width: 240px;
        flex-shrink: 0;
        border-right: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        background: #fafafa;
      }

      .sidebar-header {
        padding: 12px 16px;
        border-bottom: 1px solid var(--border);
        font-size: 0.82rem;
        color: var(--muted);
      }

      .sidebar-new-btn {
        margin: 12px 12px 8px;
        padding: 8px 12px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: none;
        color: var(--text);
        font-size: 0.85rem;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .sidebar-new-btn:hover {
        background: var(--user-bubble);
      }

      .sidebar-list {
        flex: 1;
        overflow-y: auto;
        padding: 4px 8px;
      }

      .sidebar-item {
        padding: 10px 12px;
        border-radius: 6px;
        cursor: pointer;
        font-size: 0.85rem;
        margin-bottom: 2px;
        word-break: break-word;
      }

      .sidebar-item:hover {
        background: var(--user-bubble);
      }

      .sidebar-item.active {
        background: var(--border);
        font-weight: 500;
      }

      .sidebar-item-title {
        display: block;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .sidebar-empty {
        padding: 16px 12px;
        color: var(--muted);
        font-size: 0.82rem;
        text-align: center;
      }

      .chat-area {
        flex: 1;
        display: flex;
        flex-direction: column;
        min-width: 0;
      }

      .messages {
        flex: 1;
        min-height: 0;
        overflow-y: auto;
        overflow-x: hidden;
        overscroll-behavior: contain;
        padding: 32px 16px 16px;
      }

      .messages-inner {
        max-width: 720px;
        margin: 0 auto;
        display: flex;
        flex-direction: column;
        gap: 0;
      }

      .bubble {
        line-height: 1.65;
        word-break: break-word;
        overflow-wrap: anywhere;
        animation: slideUp 180ms ease-out;
        padding: 20px 0;
      }

      .bubble + .bubble {
        border-top: none;
      }

      .bubble.assistant {
        align-self: flex-start;
        width: 100%;
        font-size: 1rem;
        color: var(--text);
      }

      .bubble.user {
        align-self: flex-end;
        background: var(--user-bubble);
        padding: 12px 18px;
        border-radius: 18px;
        max-width: 78%;
        font-size: 1rem;
      }

      .bubble pre {
        margin: 12px 0;
        padding: 16px;
        border-radius: 12px;
        overflow-x: auto;
        background: #f4f4f4;
        border: 1px solid var(--border);
        font-size: 0.875rem;
      }

      .code-block-wrap {
        position: relative;
      }

      .code-copy-btn {
        position: absolute;
        top: 10px;
        right: 10px;
        border: 1px solid rgba(255, 255, 255, 0.35);
        background: rgba(17, 24, 39, 0.75);
        color: #f9fafb;
        border-radius: 6px;
        padding: 3px 8px;
        font-size: 0.73rem;
        cursor: pointer;
        z-index: 2;
      }

      .code-copy-btn:hover {
        background: rgba(31, 41, 55, 0.95);
      }

      .bubble code {
        font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
        font-size: 0.875em;
      }

      .bubble :not(pre) > code {
        padding: 2px 5px;
        border-radius: 4px;
        background: #f4f4f4;
        border: 1px solid var(--border);
        font-size: 0.875em;
      }

      .composer-wrap {
        flex-shrink: 0;
        padding: 8px 16px 20px;
      }

      .note {
        max-width: 720px;
        margin: 0 auto 8px;
        padding: 4px;
        color: var(--muted);
        font-size: 0.84rem;
      }

      .error {
        color: #c0392b;
      }

      .warning-banner {
        flex-shrink: 0;
        text-align: center;
        padding: 8px 16px;
        color: #e53e3e;
        font-weight: 600;
        font-size: 0.85rem;
        background: #fff5f5;
        border-bottom: 1px solid #fed7d7;
      }

      .composer {
        max-width: 720px;
        margin: 0 auto;
        display: flex;
        align-items: center;
        gap: 8px;
        background: var(--composer-bg);
        border: 1px solid var(--composer-border);
        border-radius: 28px;
        padding: 8px 10px 8px 18px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
        transition: border-color 150ms ease, box-shadow 150ms ease;
      }

      .composer:focus-within {
        border-color: #b0b0b0;
        box-shadow: 0 2px 12px rgba(0, 0, 0, 0.1);
      }

      .composer input {
        flex: 1;
        border: none;
        background: transparent;
        padding: 6px 0;
        font: inherit;
        font-size: 1rem;
        color: var(--text);
        outline: none;
      }

      .composer input::placeholder {
        color: var(--muted);
      }

      .composer button {
        flex-shrink: 0;
        border: 0;
        border-radius: 50%;
        width: 36px;
        height: 36px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--accent);
        color: #fff;
        cursor: pointer;
        transition: background 120ms ease, transform 100ms ease;
      }

      .composer button:hover:not(:disabled) {
        background: var(--accent-hover);
        transform: scale(1.05);
      }

      .composer button:disabled {
        background: #d9d9d9;
        cursor: not-allowed;
      }

      @keyframes slideUp {
        from { opacity: 0; transform: translateY(6px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      @media (max-width: 640px) {
        .bubble.user { max-width: 90%; }
        .messages { padding: 20px 12px 12px; }
        .composer-wrap { padding: 8px 12px 16px; }
      }    </style>
  </head>
  <body>
    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.22.20/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.7/dist/purify.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.10.0/highlight.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"
    ></script>
    <script type="text/babel" src="/frontend/src/api.js"></script>
    <script type="text/babel" src="/frontend/src/MessageContent.jsx"></script>
    <script type="text/babel" src="/frontend/src/Composer.jsx"></script>
    <script type="text/babel" src="/frontend/src/Sidebar.jsx"></script>
    <script type="text/babel" src="/frontend/src/Auth.jsx"></script>
    <script type="text/babel" src="/frontend/src/App.jsx"></script>
  </body>
</html>
